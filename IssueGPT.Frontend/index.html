<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IssueGPT - GitHub Issue Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            padding: 30px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
            margin-bottom: 20px;
        }

        input, button {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        input {
            border: 1px solid #e0e0e0;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 30px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .issue-type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .issue-type.bug {
            background: #ffebee;
            color: #c62828;
        }

        .issue-type.feature {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .issue-type.refactor {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .issue-type.tech-debt {
            background: #fff3e0;
            color: #e65100;
        }

        .issue-type.unclear {
            background: #f1f8e9;
            color: #558b2f;
        }

        .content {
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .prompt-box {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .prompt-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .copy-btn {
            background: #4CAF50;
            padding: 8px 12px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #c62828;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 IssueGPT</h1>
            <p>AI-Powered GitHub Issue Analyzer</p>
        </div>

        <div class="card">
            <div class="input-section">
                <input type="text" id="owner" placeholder="Owner (e.g., microsoft)" />
                <input type="text" id="repo" placeholder="Repo (e.g., vscode)" />
                <input type="number" id="issueNumber" placeholder="Issue #" />
                <button onclick="analyzeIssue()" id="analyzeBtn">Analyze</button>
            </div>
        </div>

        <div id="loading" class="card loading" style="display: none;">
            <div class="spinner"></div>
            <span>Analyzing issue...</span>
        </div>

        <div id="error" class="card error" style="display: none;"></div>

        <div id="results" class="result-section"></div>
    </div>

    <script>
        // Detect API URL based on environment
        const getApiUrl = () => {
            // For local dev: http://localhost:5000
            // For K8s with port-forward: http://localhost:5000
            // For K8s with proxy: http://localhost:3000/api/issues
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                const port = window.location.port || '3000';
                if (port === '3000') {
                    // Running on frontend container, use proxied API
                    return '/api/issues';
                } else {
                    // Direct port-forward to API
                    return 'http://localhost:5000/api/issues';
                }
            }
            // Production
            return '/api/issues';
        };
        
        const API_URL = getApiUrl();

        async function analyzeIssue() {
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const issueNumber = parseInt(document.getElementById('issueNumber').value);

            if (!owner || !repo || !issueNumber) {
                showError('Please fill in all fields');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('results').innerHTML = '';
            document.getElementById('analyzeBtn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ owner, repo, issueNumber }),
                    mode: 'cors',
                    credentials: 'include'
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Analysis failed');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="card">
                    <div class="section">
                        <h2>Issue Summary</h2>
                        <span class="issue-type ${data.issueType}">${data.issueType.toUpperCase()}</span>
                        <div class="content">${escapeHtml(data.summary)}</div>
                    </div>

                    <div class="section">
                        <h2>Execution Plan</h2>
                        <div class="content">${escapeHtml(data.executionPlan)}</div>
                    </div>

                    <div class="section">
                        <h2>Risks & Concerns</h2>
                        <div class="content">${escapeHtml(data.risks)}</div>
                    </div>

                    <div class="section">
                        <h2>Questions to Clarify</h2>
                        <div class="content">${escapeHtml(data.clarifyingQuestions)}</div>
                    </div>

                    <div class="section">
                        <h2>Task Breakdown</h2>
                        <div class="content">${escapeHtml(data.taskBreakdown)}</div>
                    </div>

                    <div class="section">
                        <h2>GitHub Copilot Prompts</h2>
                        ${data.copilotPrompts.map(p => `
                            <div class="prompt-box">
                                <div class="prompt-label">${p.type}</div>
                                <div>${escapeHtml(p.content)}</div>
                                <button class="copy-btn" onclick="copyToClipboard(\`${escapeHtml(p.content)}\`)">Copy Prompt</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('results').classList.add('show');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Prompt copied to clipboard!');
            });
        }

        // Allow Enter key to trigger analysis
        document.getElementById('issueNumber').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeIssue();
        });
    </script>
</body>
</html>
