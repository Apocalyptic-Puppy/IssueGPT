version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: issuegpt-mssql
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: IssueGPT@2026
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "IssueGPT@2026" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - issuegpt-network

networks:
  issuegpt-network:
    driver: bridge

volumes:
  mssql_data:
    driver: local
