apiVersion: apps/v1
kind: Deployment
metadata:
  name: issuegpt-frontend
  namespace: issuegpt
  labels:
    app: issuegpt-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: issuegpt-frontend
  template:
    metadata:
      labels:
        app: issuegpt-frontend
    spec:
      containers:
      - name: frontend
        image: issuegpt-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: API_URL
          value: "http://issuegpt-api/api"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: issuegpt-frontend
  namespace: issuegpt
  labels:
    app: issuegpt-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: issuegpt-frontend
